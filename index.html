<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>지하철 스마트 네비게이션 (요금/환승/시간 계산)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        z-index: 10;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      input, select, button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      input { width: 140px; }

      button {
        background-color: #03c75a;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
      button:hover { background-color: #02a84b; }

      #result {
        margin-top: 15px;
        font-weight: normal;
        color: #333;
        word-break: keep-all;
        line-height: 1.6;
        font-size: 15px;
      }
      
      .fare-box {
        display: inline-block;
        background-color: #f1f3f5;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 5px;
        font-size: 14px;
        border: 1px solid #dee2e6;
      }

      #map-container {
        flex: 1;
        background: #eef2f5; /* 배경 지도 색상과 어울리게 */
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 2px solid #e9ecef;
      }

      svg { width: 100%; height: 100%; cursor: grab; }
      svg:active { cursor: grabbing; }

      .link { stroke: #ced4da; stroke-opacity: 0.65; stroke-width: 1.2px; }
      .transfer-link { stroke-dasharray: 3 3; stroke-opacity: 0.3; }
      .node { stroke: #fff; stroke-width: 0.2px; }
      .dimmed { opacity: 0.05 !important; }

      .highlight-link {
        stroke: #ff0000 !important;
        stroke-opacity: 1 !important;
        stroke-width: 2.5px !important;
        stroke-dasharray: none !important;
      }
      .highlight-node {
        stroke: #ff0000 !important;
        stroke-width: 0.5px !important;
      }

      .station-marker { display: none; pointer-events: none; }
      .station-marker.visible { display: block; }
      .station-pill { stroke: #ff0000; stroke-width: 0.2px; filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.18)); }
      .station-pill-text {
        fill: #111; font-size: 5px; font-weight: 800; text-anchor: middle;
        dominant-baseline: middle; paint-order: stroke; stroke: white;
        stroke-width: 0.4px; stroke-linejoin: round;
      }
      
      /* 지도 스타일 */
      .map-layer { fill: #fff; stroke: #ccc; stroke-width: 0.5px; }
    </style>
  </head>

  <body>
    <div class="header">
      <h2 style="margin-top:0;">🚇 스마트 지하철 길찾기</h2>

      <div class="controls">
        <input list="station-list" id="start-station" placeholder="출발역 입력..." autocomplete="off">
        <span>→</span>
        <input list="station-list" id="end-station" placeholder="도착역 입력..." autocomplete="off">
        <datalist id="station-list"></datalist>

        <select id="criterion">
          <option value="time">⏳ 최소 시간</option>
          <option value="dist">📏 최단 거리</option>
          <option value="transferPenalty">🔄 최소 환승</option>
        </select>

        <button onclick="findAndHighlightRoute()">경로 탐색</button>
        <button onclick="resetMap()" style="background: #6c757d">초기화</button>
      </div>

      <div id="result">데이터를 불러오는 중입니다...</div>
    </div>

    <div id="map-container">
      <svg id="subway-map"></svg>
    </div>

    <script>
      let rawNodes = [];
      let graphLinks = [];
      let adjList = {};
      let csvDataMap = {};
      let koreaMapData = null;

      let nodeElements;
      let linkElements;
      let stationMarkerElements;
      let currentPathSet = new Set();

      const lineColors = {
        '01호선': '#0052A4', '02호선': '#009D3E', '03호선': '#EF7C1C', '04호선': '#00A5DE',
        '05호선': '#996CAC', '06호선': '#CD7C2F', '07호선': '#747F00', '08호선': '#E6186C',
        '09호선': '#BDB092', '1호선': '#0052A4', '2호선': '#009D3E', '3호선': '#EF7C1C',
        '4호선': '#00A5DE', '5호선': '#996CAC', '6호선': '#CD7C2F', '7호선': '#747F00',
        '8호선': '#E6186C', '9호선': '#BDB092', 인천선: '#759CE6', 인천2호선: '#FD8100',
        수인분당선: '#FABE00', 경의중앙선: '#77C4A3', 경의선: '#77C4A3', 경춘선: '#0C8E72',
        공항철도: '#0090D2', 신분당선: '#D4003B', 서해선: '#81A914', 'GTX-A': '#9E7A8A',
      };

      loadSubwayData();

      function loadSubwayData() {
        Promise.all([
          fetch('./merged_subway_with_gps.json').then(res => res.json()),
          fetch('./서울교통공사 역간거리 및 소요시간_240810.csv')
            .then(res => res.ok ? res.text() : "")
            .catch(() => ""),
          // 대한민국 지도 데이터 추가
          fetch('https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_provinces_geo.json')
            .then(res => res.json())
            .catch(() => null)
        ])
        .then(([json, csvText, mapJson]) => {
          koreaMapData = mapJson;
          
          if (csvText) {
            const lines = csvText.split('\n').map(l => l.trim()).filter(l => l);
            for(let i = 1; i < lines.length; i++) {
              const row = lines[i].split(',');
              if(row.length < 5) continue;
              const lineNum = String(row[1]).padStart(2, '0') + '호선';
              const name = row[2].replace(/역$/, '').split('(')[0].trim();
              let timeSecs = 0;
              if(row[3] && row[3].includes(':')) {
                const parts = row[3].split(':');
                timeSecs = parseInt(parts[0]) * 60 + parseInt(parts[1]);
              }
              const dist = parseFloat(row[4]) || 0;
              csvDataMap[`${lineNum}-${name}`] = { timeSecs, dist };
            }
          }

          const stationData = Array.isArray(json) ? json : json.DATA || [];
          rawNodes = stationData.map((d, index) => {
            const name = d.station_nm || d.name;
            const line = d.line_num || d.line;
            return {
              id: `${line}-${d.station_cd || index}`,
              name, line,
              stationCode: d.station_cd || String(index),
              frCode: d.fr_code || '',
              lat: Number(d.lat), lng: Number(d.lng),
              color: lineColors[line] || '#999',
            };
          }).filter(d => d.name && d.line && Number.isFinite(d.lat) && Number.isFinite(d.lng));

          if (rawNodes.length === 0) return;

          fillStationOptions();
          createGraphLinks();
          createAdjList();
          renderMap();

          document.getElementById('result').innerText = `데이터 준비 완료. 한국 지도가 배경으로 로드되었습니다.`;
        });
      }

      function fillStationOptions() {
        const datalist = document.getElementById('station-list');
        datalist.innerHTML = '';
        const uniqueNames = [...new Set(rawNodes.map(n => n.name))].sort();
        uniqueNames.forEach(name => {
          let option = document.createElement('option');
          option.value = name;
          datalist.appendChild(option);
        });
      }

      function createGraphLinks() {
        graphLinks = [];
        const lineGroups = d3.group(rawNodes, d => d.line);
        lineGroups.forEach(stations => {
          stations.sort((a, b) => String(a.frCode || a.stationCode).localeCompare(String(b.frCode || b.stationCode), 'ko', {numeric: true}));
          for (let i = 0; i < stations.length - 1; i++) {
            const s = stations[i];
            const t = stations[i + 1];
            const csvData = csvDataMap[`${t.line}-${t.name}`];
            const time = (csvData && csvData.timeSecs > 0) ? csvData.timeSecs : 120;
            const dist = (csvData && csvData.dist > 0) ? csvData.dist : 1.0;
            graphLinks.push({ sourceId: s.id, targetId: t.id, isTransfer: false, time, dist, transferPenalty: time });
          }
        });
        const nameGroups = d3.group(rawNodes, d => d.name);
        nameGroups.forEach(stations => {
          if (stations.length < 2) return;
          for (let i = 0; i < stations.length; i++) {
            for (let j = i + 1; j < stations.length; j++) {
              graphLinks.push({ 
                sourceId: stations[i].id, 
                targetId: stations[j].id, 
                isTransfer: true, 
                time: 300, 
                dist: 0.1, 
                transferPenalty: 100000 + 300 
              });
            }
          }
        });
      }

      function createAdjList() {
        adjList = {};
        rawNodes.forEach(node => adjList[node.id] = []);
        graphLinks.forEach(link => {
          adjList[link.sourceId].push({ targetId: link.targetId, time: link.time, dist: link.dist, transferPenalty: link.transferPenalty, isTransfer: link.isTransfer });
          adjList[link.targetId].push({ targetId: link.sourceId, time: link.time, dist: link.dist, transferPenalty: link.transferPenalty, isTransfer: link.isTransfer });
        });
      }

      function getPillWidth(name) { return Math.max(12, name.length * 4 + 4); }

      function renderMap() {
        const svg = d3.select('#subway-map');
        const width = document.getElementById('map-container').clientWidth;
        const height = document.getElementById('map-container').clientHeight;

        svg.selectAll('*').remove();

        // 1. 프로젝션 설정 (한국 지도 중심)
        const projection = d3.geoMercator()
            .center([127.5, 36.5])
            .scale(width * 6)
            .translate([width / 2, height / 2]);

        const pathGenerator = d3.geoPath().projection(projection);

        // 2. 배경 지도 렌더링
        if (koreaMapData) {
            svg.selectAll('.map-layer')
              .data(koreaMapData.features)
              .enter().append('path')
              .attr('class', 'map-layer')
              .attr('d', pathGenerator);
        }

        // 3. 역 좌표 매핑
        rawNodes.forEach(node => {
          const coords = projection([node.lng, node.lat]);
          node.x = coords[0];
          node.y = coords[1];
          node.pillWidth = getPillWidth(node.name);
        });

        const nodeById = new Map(rawNodes.map(node => [node.id, node]));
        graphLinks.forEach(link => {
          link.sourceNode = nodeById.get(link.sourceId);
          link.targetNode = nodeById.get(link.targetId);
        });

        const g = svg.append('g');
        svg.call(d3.zoom().scaleExtent([0.5, 50]).on('zoom', event => g.attr('transform', event.transform)));

        // 4. 링크 렌더링
        linkElements = g.append('g').selectAll('line').data(graphLinks).enter().append('line')
          .attr('class', d => d.isTransfer ? 'link transfer-link' : 'link')
          .attr('x1', d => d.sourceNode.x).attr('y1', d => d.sourceNode.y)
          .attr('x2', d => d.targetNode.x).attr('y2', d => d.targetNode.y);

        // 5. 노드 렌더링 (도형 크기 0.2px)
        nodeElements = g.append('g').selectAll('circle').data(rawNodes).enter().append('circle')
          .attr('class', 'node').attr('r', 0.2).attr('cx', d => d.x).attr('cy', d => d.y).attr('fill', d => d.color)
          .on('mouseenter', (event, d) => stationMarkerElements.filter(s => s.id === d.id).classed('visible', true).raise())
          .on('mouseleave', (event, d) => { if (!currentPathSet.has(d.id)) stationMarkerElements.filter(s => s.id === d.id).classed('visible', false); });

        stationMarkerElements = g.append('g').selectAll('g').data(rawNodes).enter().append('g')
          .attr('class', 'station-marker').attr('transform', d => `translate(${d.x}, ${d.y})`);

        stationMarkerElements.append('rect').attr('class', 'station-pill')
          .attr('x', d => -d.pillWidth / 2).attr('y', -3).attr('width', d => d.pillWidth).attr('height', 6).attr('rx', 2).attr('fill', d => d.color);

        stationMarkerElements.append('text').attr('class', 'station-pill-text')
          .attr('x', 0).attr('y', 0.5).text(d => d.name);
      }

      function calculateFare(distanceKm) {
        let extraFare = 0;
        if (distanceKm > 10 && distanceKm <= 50) extraFare = Math.ceil((distanceKm - 10) / 5) * 100;
        else if (distanceKm > 50) extraFare = 800 + Math.ceil((distanceKm - 50) / 8) * 100;

        const adult = 1400 + extraFare;
        const teen = 800 + Math.floor((extraFare * 0.8) / 10) * 10;
        const child = 500 + Math.floor((extraFare * 0.5) / 10) * 10;
        return { adult: adult.toLocaleString(), teen: teen.toLocaleString(), child: child.toLocaleString() };
      }

      function findShortestPath(startName, endName, criterion) {
        const startNodes = rawNodes.filter(n => n.name === startName).map(n => n.id);
        const endNodes = rawNodes.filter(n => n.name === endName).map(n => n.id);
        if (startNodes.length === 0 || endNodes.length === 0) return null;

        const distMap = new Map();
        const prevMap = new Map();
        const unvisited = new Set();
        rawNodes.forEach(n => { distMap.set(n.id, Infinity); unvisited.add(n.id); });
        startNodes.forEach(id => distMap.set(id, 0));

        while(unvisited.size > 0) {
          let u = null, minDist = Infinity;
          for (const nodeId of unvisited) {
            const d = distMap.get(nodeId);
            if (d < minDist) { minDist = d; u = nodeId; }
          }
          if (u === null) break;
          if (endNodes.includes(u)) {
            const path = [];
            let curr = u;
            while (curr !== undefined) { path.unshift(curr); curr = prevMap.get(curr); }
            return path;
          }
          unvisited.delete(u);
          for (const edge of adjList[u]) {
            const v = edge.targetId;
            if (!unvisited.has(v)) continue;
            const alt = distMap.get(u) + edge[criterion];
            if (alt < distMap.get(v)) { distMap.set(v, alt); prevMap.set(v, u); }
          }
        }
        return null;
      }

      function findAndHighlightRoute() {
        const startName = document.getElementById('start-station').value.trim();
        const endName = document.getElementById('end-station').value.trim();
        const criterion = document.getElementById('criterion').value;
        if (!startName || !endName) return alert('출발역과 도착역을 모두 올바르게 입력해주세요.');
        resetMap(false);
        const path = findShortestPath(startName, endName, criterion);
        const resultDiv = document.getElementById('result');
        if (!path) { resultDiv.innerHTML = '<span style="color:red">경로를 찾을 수 없습니다.</span>'; return; }

        let totalTimeSecs = 0, totalDist = 0, transferCount = 0;
        for (let i = 0; i < path.length - 1; i++) {
          const edge = adjList[path[i]].find(e => e.targetId === path[i+1]);
          totalTimeSecs += edge.time; totalDist += edge.dist;
          if(edge.isTransfer) transferCount++;
        }

        const mins = Math.floor(totalTimeSecs / 60);
        const secs = totalTimeSecs % 60;
        const timeStr = secs > 0 ? `${mins}분 ${secs}초` : `${mins}분`;
        const distStr = totalDist.toFixed(1) + 'km';
        const fares = calculateFare(totalDist);

        currentPathSet = new Set(path);
        const linkSet = new Set();
        for (let i = 0; i < path.length - 1; i++) {
          linkSet.add(`${path[i]}__${path[i + 1]}`);
          linkSet.add(`${path[i + 1]}__${path[i]}`);
        }

        nodeElements.classed('dimmed', d => !currentPathSet.has(d.id)).classed('highlight-node', d => currentPathSet.has(d.id)).attr('r', d => (currentPathSet.has(d.id) ? 0.5 : 0.2));
        stationMarkerElements.classed('visible', d => currentPathSet.has(d.id)).classed('dimmed', d => !currentPathSet.has(d.id)).raise();
        linkElements.classed('dimmed', d => !linkSet.has(`${d.sourceId}__${d.targetId}`)).classed('highlight-link', d => linkSet.has(`${d.sourceId}__${d.targetId}`));

        let prevName = "";
        const pathNames = [];
        path.forEach((id) => {
          const station = rawNodes.find(node => node.id === id);
          if(station.name !== prevName) {
             pathNames.push(`<strong>${station.name}</strong>`);
             prevName = station.name;
          }
        });

        resultDiv.innerHTML = `<span style="color:#03c75a; font-weight:bold;">경로 탐색 완료!</span><br>🕒 <b>${timeStr}</b> | 📏 ${distStr} | 🔄 ${transferCount}회 환승<br><div class="fare-box">💳 <b>일반: ${fares.adult}원</b> | 청소년: ${fares.teen}원 | 어린이: ${fares.child}원</div><div style="margin-top:10px;">${pathNames.join(' ➡️ ')}</div>`;
      }

      function resetMap(changeText = true) {
        if (!nodeElements || !linkElements || !stationMarkerElements) return;
        currentPathSet = new Set();
        nodeElements.classed('dimmed', false).classed('highlight-node', false).attr('r', 0.2);
        linkElements.classed('dimmed', false).classed('highlight-link', false);
        stationMarkerElements.classed('visible', false).classed('dimmed', false);
        if (changeText) document.getElementById('result').innerText = '지도가 초기화되었습니다. 검색하세요.';
      }
    </script>
  </body>
</html>
