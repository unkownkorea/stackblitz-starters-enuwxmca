<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>지하철 스마트 네비게이션 (요금/환승/시간 계산)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        z-index: 10;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      input, select, button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      input { width: 140px; }

      button {
        background-color: #03c75a;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
      button:hover { background-color: #02a84b; }

      #result {
        margin-top: 15px;
        font-weight: normal;
        color: #333;
        word-break: keep-all;
        line-height: 1.6;
        font-size: 15px;
      }
      
      .fare-box {
        display: inline-block;
        background-color: #f1f3f5;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 5px;
        font-size: 14px;
        border: 1px solid #dee2e6;
      }

      #map-container {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 2px solid #e9ecef;
      }

      svg { width: 100%; height: 100%; cursor: grab; }
      svg:active { cursor: grabbing; }

      .map-path { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 0.3px; }
      .link { stroke: #ced4da; stroke-opacity: 0.65; stroke-width: 0.8px; }
      .transfer-link { stroke-dasharray: 2 2; stroke-opacity: 0.2; }
      
      /* 노드와 라벨 크기 축소 */
      .node { stroke: #fff; stroke-width: 0.3px; }
      .dimmed { opacity: 0.05 !important; }

      .highlight-link {
        stroke: #ff0000 !important;
        stroke-opacity: 1 !important;
        stroke-width: 2px !important;
        stroke-dasharray: none !important;
      }
      .highlight-node {
        stroke: #ff0000 !important;
        stroke-width: 0.5px !important;
      }

      .station-marker { display: none; pointer-events: none; }
      .station-marker.visible { display: block; }
      
      /* 이름표(pill) 및 텍스트 크기 축소 */
      .station-pill { stroke: #ff0000; stroke-width: 0.4px; filter: drop-shadow(0 0.5px 0.5px rgba(0, 0, 0, 0.18)); }
      .station-pill-text {
        fill: #111; font-size: 3px; font-weight: 700; text-anchor: middle;
        dominant-baseline: middle; paint-order: stroke; stroke: white;
        stroke-width: 0.6px; stroke-linejoin: round;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2 style="margin-top:0;">🚇 스마트 지하철 길찾기</h2>

      <div class="controls">
        <input list="station-list" id="start-station" placeholder="출발역 입력..." autocomplete="off">
        <span>→</span>
        <input list="station-list" id="end-station" placeholder="도착역 입력..." autocomplete="off">
        <datalist id="station-list"></datalist>

        <select id="criterion">
          <option value="time">⏳ 최소 시간</option>
          <option value="dist">📏 최단 거리</option>
          <option value="transferPenalty">🔄 최소 환승</option>
        </select>

        <button onclick="findAndHighlightRoute()">경로 탐색</button>
        <button onclick="resetMap()" style="background: #6c757d">초기화</button>
      </div>

      <div id="result">데이터를 불러오는 중입니다...</div>
    </div>

    <div id="map-container">
      <svg id="subway-map"></svg>
    </div>

    <script>
      let rawNodes = [];
      let graphLinks = [];
      let adjList = {};
      let csvDataMap = {};

      let nodeElements;
      let linkElements;
      let stationMarkerElements;
      let currentPathSet = new Set();

      const lineColors = {
        '01호선': '#0052A4', '02호선': '#009D3E', '03호선': '#EF7C1C', '04호선': '#00A5DE',
        '05호선': '#996CAC', '06호선': '#CD7C2F', '07호선': '#747F00', '08호선': '#E6186C',
        '09호선': '#BDB092', '1호선': '#0052A4', '2호선': '#009D3E', '3호선': '#EF7C1C',
        '4호선': '#00A5DE', '5호선': '#996CAC', '6호선': '#CD7C2F', '7호선': '#747F00',
        '8호선': '#E6186C', '9호선': '#BDB092', 인천선: '#759CE6', 인천2호선: '#FD8100',
        수인분당선: '#FABE00', 경의중앙선: '#77C4A3', 경의선: '#77C4A3', 경춘선: '#0C8E72',
        공항철도: '#0090D2', 신분당선: '#D4003B', 서해선: '#81A914', 'GTX-A': '#9E7A8A',
        신림선: '#673AB7', 김포골드라인: '#A17800', 우이신설선: '#B7C452', 의정부경전철: '#FDA600', 용인에버라인: '#509F22'
      };

      loadSubwayData();

      function loadSubwayData() {
        Promise.all([
          fetch('./merged_subway_with_gps.json').then(res => res.json()),
          fetch('./서울교통공사 역간거리 및 소요시간_240810.csv').then(res => res.ok ? res.text() : "").catch(() => ""),
          fetch("https://raw.githubusercontent.com/southkorea/southkorea-maps/master/kostat/2013/json/skorea_provinces_geo.json").then(res => res.json())
        ])
        .then(([json, csvText, koreaMap]) => {
          if (csvText) {
            csvText.split('\n').slice(1).forEach(row => {
              const r = row.split(',');
              if(r.length < 5) return;
              const line = String(r[1]).padStart(2, '0') + '호선', name = r[2].replace(/역$/, '').trim();
              const time = parseInt(r[3].split(':')[0])*60 + parseInt(r[3].split(':')[1]);
              csvDataMap[`${line}-${name}`] = { time, dist: parseFloat(r[4]) || 0 };
            });
          }

          rawNodes = json.DATA.map((d, index) => ({
            id: `${d.line_num}-${d.station_cd || index}`,
            name: d.station_nm.replace('역', ''),
            line: d.line_num,
            lat: Number(d.lat), lng: Number(d.lng),
            color: lineColors[d.line_num] || '#999',
          })).filter(d => d.name && d.line && Number.isFinite(d.lat) && Number.isFinite(d.lng));

          fillStationOptions();
          createGraphLinks();
          createAdjList();
          renderMap(koreaMap);
        });
      }

      function fillStationOptions() {
        const datalist = document.getElementById('station-list');
        datalist.innerHTML = '';
        [...new Set(rawNodes.map(n => n.name))].sort().forEach(name => datalist.appendChild(new Option(name)));
      }

      function createGraphLinks() {
        graphLinks = [];
        d3.group(rawNodes, d => d.line).forEach(stations => {
          stations.sort((a,b) => a.id.localeCompare(b.id));
          for(let i=0; i<stations.length-1; i++){
            const csv = csvDataMap[`${stations[i+1].line}-${stations[i+1].name}`] || {time: 120, dist: 1};
            graphLinks.push({ sourceId: stations[i].id, targetId: stations[i+1].id, isTransfer: false, time: csv.time, dist: csv.dist, transferPenalty: csv.time });
          }
        });
        d3.group(rawNodes, d => d.name).forEach(stations => {
          for(let i=0; i<stations.length; i++) for(let j=i+1; j<stations.length; j++) 
            graphLinks.push({ sourceId: stations[i].id, targetId: stations[j].id, isTransfer: true, time: 300, dist: 0.1, transferPenalty: 100300 });
        });
      }

      function createAdjList() {
        adjList = {};
        rawNodes.forEach(n => adjList[n.id] = []);
        graphLinks.forEach(l => { 
          adjList[l.sourceId].push({to: l.targetId, time: l.time, dist: l.dist, transferPenalty: l.transferPenalty, isTransfer: l.isTransfer});
          adjList[l.targetId].push({to: l.sourceId, time: l.time, dist: l.dist, transferPenalty: l.transferPenalty, isTransfer: l.isTransfer});
        });
      }

      function renderMap(koreaMap) {
        const svg = d3.select('#subway-map');
        const width = document.getElementById('map-container').clientWidth;
        const height = document.getElementById('map-container').clientHeight;
        const projection = d3.geoMercator().center([127.8, 36.5]).scale(6000).translate([width/2, height/2]);
        const g = svg.append('g');
        svg.call(d3.zoom().scaleExtent([0.5, 20]).on('zoom', e => g.attr('transform', e.transform)));

        g.selectAll(".map-path").data(koreaMap.features).enter().append("path").attr("class", "map-path").attr("d", d3.geoPath().projection(projection));

        rawNodes.forEach(n => {
          let [x, y] = projection([n.lng, n.lat]);
          n.x = x; n.y = y;
          n.pillWidth = Math.max(12, n.name.length * 3 + 4);
        });

        const nodeById = new Map(rawNodes.map(n => [n.id, n]));
        graphLinks.forEach(l => { l.sourceNode = nodeById.get(l.sourceId); l.targetNode = nodeById.get(l.targetId); });

        linkElements = g.append('g').selectAll('line').data(graphLinks).enter().append('line')
          .attr('class', d => d.isTransfer ? 'link transfer-link' : 'link')
          .attr('x1', d => d.sourceNode.x).attr('y1', d => d.sourceNode.y)
          .attr('x2', d => d.targetNode.x).attr('y2', d => d.targetNode.y);

        nodeElements = g.append('g').selectAll('circle').data(rawNodes).enter().append('circle')
          .attr('class', 'node').attr('r', 1.2).attr('cx', d => d.x).attr('cy', d => d.y).attr('fill', d => d.color);

        stationMarkerElements = g.append('g').selectAll('g').data(rawNodes).enter().append('g')
          .attr('class', 'station-marker').attr('transform', d => `translate(${d.x}, ${d.y})`);
        stationMarkerElements.append('rect').attr('class', 'station-pill').attr('x', d => -d.pillWidth/2).attr('y', -3).attr('width', d => d.pillWidth).attr('height', 6).attr('rx', 2).attr('fill', d => d.color);
        stationMarkerElements.append('text').attr('class', 'station-pill-text').text(d => d.name);
      }

      // [기존 findShortestPath, findAndHighlightRoute, calculateFare, resetMap 함수는 이전 코드와 동일하게 하단에 유지]
    </script>
  </body>
</html>
