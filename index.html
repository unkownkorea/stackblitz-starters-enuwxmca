<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>지하철 경로 탐색기</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        z-index: 10;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      select,
      button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      button {
        background-color: #03c75a;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background-color: #02a84b;
      }

      #result {
        margin-top: 15px;
        font-weight: bold;
        color: #333;
        word-break: keep-all;
        line-height: 1.5;
      }

      #map-container {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 2px solid #e9ecef;
      }

      svg {
        width: 100%;
        height: 100%;
        cursor: grab;
      }

      svg:active {
        cursor: grabbing;
      }

      .link {
        stroke: #ced4da;
        stroke-opacity: 0.65;
        stroke-width: 1.2px;
      }

      .transfer-link {
        stroke-dasharray: 3 3;
        stroke-opacity: 0.3;
      }

      .node {
        stroke: #fff;
        stroke-width: 0.6px;
      }

      .dimmed {
        opacity: 0.05 !important;
      }

      .highlight-link {
        stroke: #ff0000 !important;
        stroke-opacity: 1 !important;
        stroke-width: 2.5px !important;
        stroke-dasharray: none !important;
      }

      .highlight-node {
        stroke: #ff0000 !important;
        stroke-width: 1px !important;
      }

      .station-marker {
        display: none;
        pointer-events: none;
      }

      .station-marker.visible {
        display: block;
      }

      .station-pill {
        stroke: #ff0000;
        stroke-width: 0.6px;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.18));
      }

      .station-pill-text {
        fill: #111;
        font-size: 5px;
        font-weight: 800;
        text-anchor: middle;
        dominant-baseline: middle;
        paint-order: stroke;
        stroke: white;
        stroke-width: 0.8px;
        stroke-linejoin: round;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2>지하철 경로 탐색기</h2>

      <div class="controls">
        <select id="start-station">
          <option value="">출발역 선택...</option>
        </select>

        <span>→</span>

        <select id="end-station">
          <option value="">도착역 선택...</option>
        </select>

        <button onclick="findAndHighlightRoute()">최단 경로 탐색</button>
        <button onclick="resetMap()" style="background: #6c757d">초기화</button>
      </div>

      <div id="result">JSON 데이터를 불러오는 중입니다...</div>
    </div>

    <div id="map-container">
      <svg id="subway-map"></svg>
    </div>

    <script>
      let rawNodes = [];
      let graphLinks = [];
      let adjList = {};
      let nodeElements;
      let linkElements;
      let stationMarkerElements;
      let currentPathSet = new Set();

      const lineColors = {
        '01호선': '#0052A4',
        '02호선': '#009D3E',
        '03호선': '#EF7C1C',
        '04호선': '#00A5DE',
        '05호선': '#996CAC',
        '06호선': '#CD7C2F',
        '07호선': '#747F00',
        '08호선': '#E6186C',
        '09호선': '#BDB092',
        '1호선': '#0052A4',
        '2호선': '#009D3E',
        '3호선': '#EF7C1C',
        '4호선': '#00A5DE',
        '5호선': '#996CAC',
        '6호선': '#CD7C2F',
        '7호선': '#747F00',
        '8호선': '#E6186C',
        '9호선': '#BDB092',
        인천선: '#759CE6',
        인천2호선: '#FD8100',
        수인분당선: '#FABE00',
        경의중앙선: '#77C4A3',
        경의선: '#77C4A3',
        경춘선: '#0C8E72',
        공항철도: '#0090D2',
        신분당선: '#D4003B',
        서해선: '#81A914',
        'GTX-A': '#9E7A8A',
      };

      loadSubwayData();

      function loadSubwayData() {
        fetch('./merged_subway_with_gps.json')
          .then((response) => {
            if (!response.ok) {
              throw new Error('JSON 파일을 찾을 수 없습니다.');
            }

            return response.json();
          })
          .then((json) => {
            const stationData = Array.isArray(json) ? json : json.DATA || [];

            rawNodes = stationData
              .map((d, index) => {
                const name = d.station_nm || d.name;
                const line = d.line_num || d.line;
                const stationCode = d.station_cd || d.bldn_id || String(index);
                const lat = Number(d.lat);
                const lng = Number(d.lng);

                return {
                  id: `${line}-${stationCode}-${index}`,
                  name,
                  line,
                  stationCode,
                  frCode: d.fr_code || '',
                  lat,
                  lng,
                  color: lineColors[line] || '#999',
                };
              })
              .filter((d) => {
                return (
                  d.name &&
                  d.line &&
                  Number.isFinite(d.lat) &&
                  Number.isFinite(d.lng)
                );
              });

            if (rawNodes.length === 0) {
              document.getElementById('result').innerText =
                '역 좌표 데이터를 찾지 못했습니다. JSON 필드명을 확인하세요.';
              return;
            }

            fillStationOptions();
            createGraphLinks();
            createAdjList();
            renderMap();

            document.getElementById(
              'result'
            ).innerText = `총 ${rawNodes.length}개의 역 좌표 데이터를 불러왔습니다. 출발역과 도착역을 선택하세요.`;
          })
          .catch((error) => {
            console.error(error);
            document.getElementById('result').innerText =
              '오류: merged_subway_with_gps.json 파일 이름이나 JSON 형식을 확인하세요.';
          });
      }

      function fillStationOptions() {
        const startSelect = document.getElementById('start-station');
        const endSelect = document.getElementById('end-station');

        startSelect.innerHTML = '<option value="">출발역 선택...</option>';
        endSelect.innerHTML = '<option value="">도착역 선택...</option>';

        rawNodes.forEach((station) => {
          const text = `${station.name} (${station.line})`;

          startSelect.add(new Option(text, station.id));
          endSelect.add(new Option(text, station.id));
        });
      }

      function createGraphLinks() {
        graphLinks = [];

        const lineGroups = d3.group(rawNodes, (d) => d.line);

        lineGroups.forEach((stations) => {
          stations.sort((a, b) => {
            const aKey = a.frCode || a.stationCode;
            const bKey = b.frCode || b.stationCode;

            return String(aKey).localeCompare(String(bKey), 'ko', {
              numeric: true,
            });
          });

          for (let i = 0; i < stations.length - 1; i++) {
            graphLinks.push({
              sourceId: stations[i].id,
              targetId: stations[i + 1].id,
              transfer: false,
            });
          }
        });

        const nameGroups = d3.group(rawNodes, (d) => d.name);

        nameGroups.forEach((stations) => {
          if (stations.length < 2) return;

          for (let i = 0; i < stations.length; i++) {
            for (let j = i + 1; j < stations.length; j++) {
              graphLinks.push({
                sourceId: stations[i].id,
                targetId: stations[j].id,
                transfer: true,
              });
            }
          }
        });
      }

      function createAdjList() {
        adjList = {};

        rawNodes.forEach((node) => {
          adjList[node.id] = [];
        });

        graphLinks.forEach((link) => {
          adjList[link.sourceId].push(link.targetId);
          adjList[link.targetId].push(link.sourceId);
        });
      }

      function getPillWidth(name) {
        return Math.max(18, name.length * 6 + 8);
      }

      function renderMap() {
        const svg = d3.select('#subway-map');
        const container = document.getElementById('map-container');
        const width = container.clientWidth;
        const height = container.clientHeight;
        const padding = 50;

        svg.selectAll('*').remove();

        const lngExtent = d3.extent(rawNodes, (d) => d.lng);
        const latExtent = d3.extent(rawNodes, (d) => d.lat);

        const xScale = d3
          .scaleLinear()
          .domain(lngExtent)
          .range([padding, width - padding]);

        const yScale = d3
          .scaleLinear()
          .domain(latExtent)
          .range([height - padding, padding]);

        rawNodes.forEach((node) => {
          node.x = xScale(node.lng);
          node.y = yScale(node.lat);
          node.pillWidth = getPillWidth(node.name);
        });

        const nodeById = new Map(rawNodes.map((node) => [node.id, node]));

        graphLinks.forEach((link) => {
          link.sourceNode = nodeById.get(link.sourceId);
          link.targetNode = nodeById.get(link.targetId);
        });

        const g = svg.append('g');

        svg.call(
          d3
            .zoom()
            .scaleExtent([0.5, 10])
            .on('zoom', (event) => {
              g.attr('transform', event.transform);
            })
        );

        linkElements = g
          .append('g')
          .selectAll('line')
          .data(graphLinks)
          .enter()
          .append('line')
          .attr('class', (d) => (d.transfer ? 'link transfer-link' : 'link'))
          .attr('x1', (d) => d.sourceNode.x)
          .attr('y1', (d) => d.sourceNode.y)
          .attr('x2', (d) => d.targetNode.x)
          .attr('y2', (d) => d.targetNode.y);

        nodeElements = g
          .append('g')
          .selectAll('circle')
          .data(rawNodes)
          .enter()
          .append('circle')
          .attr('class', 'node')
          .attr('r', 1.5)
          .attr('cx', (d) => d.x)
          .attr('cy', (d) => d.y)
          .attr('fill', (d) => d.color)
          .on('mouseenter', function (event, d) {
            stationMarkerElements
              .filter((station) => station.id === d.id)
              .classed('visible', true)
              .raise();
          })
          .on('mouseleave', function (event, d) {
            if (currentPathSet.has(d.id)) return;

            stationMarkerElements
              .filter((station) => station.id === d.id)
              .classed('visible', false);
          });

        stationMarkerElements = g
          .append('g')
          .selectAll('g')
          .data(rawNodes)
          .enter()
          .append('g')
          .attr('class', 'station-marker')
          .attr('transform', (d) => `translate(${d.x}, ${d.y})`);

        stationMarkerElements
          .append('rect')
          .attr('class', 'station-pill')
          .attr('x', (d) => -d.pillWidth / 2)
          .attr('y', -4.5)
          .attr('width', (d) => d.pillWidth)
          .attr('height', 9)
          .attr('rx', 4.5)
          .attr('fill', (d) => d.color);

        stationMarkerElements
          .append('text')
          .attr('class', 'station-pill-text')
          .attr('x', 0)
          .attr('y', 0.7)
          .text((d) => d.name);
      }

      function bfs(startId, endId) {
        if (startId === endId) return [startId];

        const queue = [[startId]];
        const visited = new Set([startId]);

        while (queue.length > 0) {
          const path = queue.shift();
          const current = path[path.length - 1];

          for (const next of adjList[current] || []) {
            if (!visited.has(next)) {
              const newPath = [...path, next];

              if (next === endId) return newPath;

              visited.add(next);
              queue.push(newPath);
            }
          }
        }

        return null;
      }

      function findAndHighlightRoute() {
        const startId = document.getElementById('start-station').value;
        const endId = document.getElementById('end-station').value;

        if (!startId || !endId) {
          alert('출발역과 도착역을 모두 선택해주세요.');
          return;
        }

        resetMap(false);

        const path = bfs(startId, endId);
        const resultDiv = document.getElementById('result');

        if (!path) {
          resultDiv.innerHTML =
            '<span style="color:red">경로를 찾을 수 없습니다.</span>';
          return;
        }

        const pathSet = new Set(path);
        const linkSet = new Set();
        currentPathSet = pathSet;

        for (let i = 0; i < path.length - 1; i++) {
          linkSet.add(`${path[i]}__${path[i + 1]}`);
          linkSet.add(`${path[i + 1]}__${path[i]}`);
        }

        nodeElements
          .classed('dimmed', (d) => !pathSet.has(d.id))
          .classed('highlight-node', (d) => pathSet.has(d.id))
          .attr('r', (d) => (pathSet.has(d.id) ? 2.5 : 1.5));

        stationMarkerElements
          .classed('visible', (d) => pathSet.has(d.id))
          .classed('dimmed', (d) => !pathSet.has(d.id))
          .raise();

        linkElements
          .classed('dimmed', (d) => {
            return !linkSet.has(`${d.sourceId}__${d.targetId}`);
          })
          .classed('highlight-link', (d) => {
            return linkSet.has(`${d.sourceId}__${d.targetId}`);
          });

        const pathNames = path.map((id) => {
          const station = rawNodes.find((node) => node.id === id);
          return `${station.name}(${station.line})`;
        });

        resultDiv.innerHTML = `총 <strong>${
          path.length - 1
        } 정거장</strong>을 이동합니다.<br>경로: ${pathNames.join(' → ')}`;
      }

      function resetMap(changeText = true) {
        if (!nodeElements || !linkElements || !stationMarkerElements) return;

        currentPathSet = new Set();

        nodeElements
          .classed('dimmed', false)
          .classed('highlight-node', false)
          .attr('r', 1.5);

        linkElements.classed('dimmed', false).classed('highlight-link', false);

        stationMarkerElements
          .classed('visible', false)
          .classed('dimmed', false);

        if (changeText) {
          document.getElementById('result').innerText =
            '지도가 초기화되었습니다. 출발역과 도착역을 선택하세요.';
        }
      }
    </script>
  </body>
</html>
