<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>지하철 스마트 네비게이션 (요금/환승/시간 계산)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }

      .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        z-index: 10;
      }

      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      input, select, button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      input { width: 140px; }

      button {
        background-color: #03c75a;
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
      button:hover { background-color: #02a84b; }

      #result {
        margin-top: 15px;
        font-weight: normal;
        color: #333;
        word-break: keep-all;
        line-height: 1.6;
        font-size: 15px;
      }
      
      .fare-box {
        display: inline-block;
        background-color: #f1f3f5;
        padding: 8px 12px;
        border-radius: 6px;
        margin-top: 5px;
        font-size: 14px;
        border: 1px solid #dee2e6;
      }

      #map-container {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 2px solid #e9ecef;
      }

      svg { width: 100%; height: 100%; cursor: grab; }
      svg:active { cursor: grabbing; }

      .link { stroke: #ced4da; stroke-opacity: 0.65; stroke-width: 1.2px; }
      .transfer-link { stroke-dasharray: 3 3; stroke-opacity: 0.3; }
      .node { stroke: #fff; stroke-width: 0.6px; }
      .dimmed { opacity: 0.05 !important; }

      .highlight-link {
        stroke: #ff0000 !important;
        stroke-opacity: 1 !important;
        stroke-width: 2.5px !important;
        stroke-dasharray: none !important;
      }
      .highlight-node {
        stroke: #ff0000 !important;
        stroke-width: 1px !important;
      }

      .station-marker { display: none; pointer-events: none; }
      .station-marker.visible { display: block; }
      .station-pill { stroke: #ff0000; stroke-width: 0.6px; filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.18)); }
      
      /* 역 이름 텍스트 크기를 0.5px로 설정 */
      .station-pill-text {
        fill: #111; font-size: 0.5px; font-weight: 800; text-anchor: middle;
        dominant-baseline: middle; paint-order: stroke; stroke: white;
        stroke-width: 0.1px; stroke-linejoin: round;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2 style="margin-top:0;">🚇 스마트 지하철 길찾기</h2>

      <div class="controls">
        <input list="station-list" id="start-station" placeholder="출발역 입력..." autocomplete="off">
        <span>→</span>
        <input list="station-list" id="end-station" placeholder="도착역 입력..." autocomplete="off">
        <datalist id="station-list"></datalist>

        <select id="criterion">
          <option value="time">⏳ 최소 시간</option>
          <option value="dist">📏 최단 거리</option>
          <option value="transferPenalty">🔄 최소 환승</option>
        </select>

        <button onclick="findAndHighlightRoute()">경로 탐색</button>
        <button onclick="resetMap()" style="background: #6c757d">초기화</button>
      </div>

      <div id="result">데이터를 불러오는 중입니다...</div>
    </div>

    <div id="map-container">
      <svg id="subway-map"></svg>
    </div>

    <script>
      let rawNodes = [];
      let graphLinks = [];
      let adjList = {};
      let csvDataMap = {};

      let nodeElements;
      let linkElements;
      let stationMarkerElements;
      let currentPathSet = new Set();

      const lineColors = {
        '01호선': '#0052A4', '02호선': '#009D3E', '03호선': '#EF7C1C', '04호선': '#00A5DE',
        '05호선': '#996CAC', '06호선': '#CD7C2F', '07호선': '#747F00', '08호선': '#E6186C',
        '09호선': '#BDB092', '1호선': '#0052A4', '2호선': '#009D3E', '3호선': '#EF7C1C',
        '4호선': '#00A5DE', '5호선': '#996CAC', '6호선': '#CD7C2F', '7호선': '#747F00',
        '8호선': '#E6186C', '9호선': '#BDB092', 인천선: '#759CE6', 인천2호선: '#FD8100',
        수인분당선: '#FABE00', 경의중앙선: '#77C4A3', 경의선: '#77C4A3', 경춘선: '#0C8E72',
        공항철도: '#0090D2', 신분당선: '#D4003B', 서해선: '#81A914', 'GTX-A': '#9E7A8A',
        신림선: '#673AB7', 김포골드라인: '#A17800', 우이신설선: '#B7C452', 의정부경전철: '#FDA600', 용인에버라인: '#509F22'
      };

      loadSubwayData();

      function loadSubwayData() {
        Promise.all([
          fetch('./merged_subway_with_gps.json').then(res => res.json()),
          fetch('./서울교통공사 역간거리 및 소요시간_240810.csv')
            .then(res => res.ok ? res.text() : "")
            .catch(() => "")
        ])
        .then(([json, csvText]) => {
          if (csvText) {
            csvText.split('\n').slice(1).forEach(row => {
              const r = row.split(',');
              if(r.length < 5) return;
              const line = String(r[1]).padStart(2, '0') + '호선', name = r[2].replace(/역$/, '').split('(')[0].trim();
              const time = parseInt(r[3].split(':')[0])*60 + parseInt(r[3].split(':')[1]);
              csvDataMap[`${line}-${name}`] = { time, dist: parseFloat(r[4]) || 0 };
            });
          }

          const stationData = Array.isArray(json) ? json : json.DATA || [];
          rawNodes = stationData.map((d, index) => ({
            id: `${d.line_num}-${d.station_cd || index}`,
            name: d.station_nm.replace('역', ''),
            line: d.line_num,
            lat: Number(d.lat), lng: Number(d.lng),
            color: lineColors[d.line_num] || '#999',
          })).filter(d => d.name && d.line && Number.isFinite(d.lat) && Number.isFinite(d.lng));

          fillStationOptions();
          createGraphLinks();
          createAdjList();
          renderMap();

          document.getElementById('result').innerText = `총 ${rawNodes.length}개 역 데이터를 불러왔습니다.`;
        });
      }

      function fillStationOptions() {
        const datalist = document.getElementById('station-list');
        datalist.innerHTML = '';
        [...new Set(rawNodes.map(n => n.name))].sort().forEach(name => datalist.appendChild(new Option(name)));
      }

      function createGraphLinks() {
        graphLinks = [];
        d3.group(rawNodes, d => d.line).forEach(stations => {
          stations.sort((a, b) => a.id.localeCompare(b.id, 'ko', {numeric: true}));
          for (let i = 0; i < stations.length - 1; i++) {
            const csv = csvDataMap[`${stations[i+1].line}-${stations[i+1].name}`] || {time: 120, dist: 1};
            graphLinks.push({ sourceId: stations[i].id, targetId: stations[i+1].id, isTransfer: false, time: csv.time, dist: csv.dist, transferPenalty: csv.time });
          }
        });
        d3.group(rawNodes, d => d.name).forEach(stations => {
          if (stations.length < 2) return;
          for (let i = 0; i < stations.length; i++) for (let j = i + 1; j < stations.length; j++) 
            graphLinks.push({ sourceId: stations[i].id, targetId: stations[j].id, isTransfer: true, time: 300, dist: 0.1, transferPenalty: 100300 });
        });
      }

      function createAdjList() {
        adjList = {};
        rawNodes.forEach(node => adjList[node.id] = []);
        graphLinks.forEach(link => {
          adjList[link.sourceId].push({ to: link.targetId, time: link.time, dist: link.dist, transferPenalty: link.transferPenalty, isTransfer: link.isTransfer });
          adjList[link.targetId].push({ to: link.sourceId, time: link.time, dist: link.dist, transferPenalty: link.transferPenalty, isTransfer: link.isTransfer });
        });
      }

      function getPillWidth(name) { return Math.max(5, name.length * 0.5 + 2); }

      function renderMap() {
        const svg = d3.select('#subway-map');
        const width = document.getElementById('map-container').clientWidth;
        const height = document.getElementById('map-container').clientHeight;
        svg.selectAll('*').remove();
        
        const g = svg.append('g');
        svg.call(d3.zoom().scaleExtent([0.5, 20]).on('zoom', e => g.attr('transform', e.transform)));

        const xScale = d3.scaleLinear().domain(d3.extent(rawNodes, d => d.lng)).range([50, width - 50]);
        const yScale = d3.scaleLinear().domain(d3.extent(rawNodes, d => d.lat)).range([height - 50, 50]);

        rawNodes.forEach(n => { n.x = xScale(n.lng); n.y = yScale(n.lat); n.pillWidth = getPillWidth(n.name); });
        const nodeById = new Map(rawNodes.map(n => [n.id, n]));
        graphLinks.forEach(l => { l.sourceNode = nodeById.get(l.sourceId); l.targetNode = nodeById.get(l.targetId); });

        linkElements = g.append('g').selectAll('line').data(graphLinks).enter().append('line')
          .attr('class', d => d.isTransfer ? 'link transfer-link' : 'link')
          .attr('x1', d => d.sourceNode.x).attr('y1', d => d.sourceNode.y)
          .attr('x2', d => d.targetNode.x).attr('y2', d => d.targetNode.y);

        // 노드 반지름을 0.5px로 설정
        nodeElements = g.append('g').selectAll('circle').data(rawNodes).enter().append('circle')
          .attr('class', 'node').attr('r', 0.5).attr('cx', d => d.x).attr('cy', d => d.y).attr('fill', d => d.color);

        stationMarkerElements = g.append('g').selectAll('g').data(rawNodes).enter().append('g')
          .attr('class', 'station-marker').attr('transform', d => `translate(${d.x}, ${d.y})`);
        stationMarkerElements.append('rect').attr('class', 'station-pill').attr('x', d => -d.pillWidth/2).attr('y', -1).attr('width', d => d.pillWidth).attr('height', 2).attr('rx', 0.5).attr('fill', d => d.color);
        stationMarkerElements.append('text').attr('class', 'station-pill-text').text(d => d.name);
      }

      function calculateFare(dist) {
        let extra = dist > 10 ? Math.ceil((dist - 10) / 5) * 100 : 0;
        if (dist > 50) extra = 800 + Math.ceil((dist - 50) / 8) * 100;
        return { adult: (1400 + extra).toLocaleString(), teen: (800 + Math.floor(extra*0.8/10)*10).toLocaleString(), child: (500 + Math.floor(extra*0.5/10)*10).toLocaleString() };
      }

      function findShortestPath(startName, endName, criterion) {
        const sIds = rawNodes.filter(n => n.name == startName).map(n => n.id), eIds = rawNodes.filter(n => n.name == endName).map(n => n.id);
        if(!sIds.length || !eIds.length) return null;
        const dists = {}, prev = {}, q = new Set(rawNodes.map(n => n.id));
        rawNodes.forEach(n => dists[n.id] = Infinity);
        sIds.forEach(id => dists[id] = 0);
        while(q.size) {
          let u = [...q].reduce((a, b) => dists[a] < dists[b] ? a : b);
          if(dists[u] === Infinity || eIds.includes(u)) break;
          q.delete(u);
          adjList[u].forEach(e => {
            let w = criterion == 'transferPenalty' ? e.transferPenalty : (criterion == 'time' ? e.time : e.dist);
            if(dists[u] + w < dists[e.to]) { dists[e.to] = dists[u] + w; prev[e.to] = u; }
          });
        }
        let path = [], curr = eIds.find(id => prev[id]);
        while(curr) { path.unshift(curr); curr = prev[curr]; }
        return path.length ? path : null;
      }

      function findAndHighlightRoute() {
        const s = document.getElementById('start-station').value.trim(), e = document.getElementById('end-station').value.trim(), crit = document.getElementById('criterion').value;
        if(!s || !e) return alert('출발역과 도착역을 입력하세요.');
        resetMap(false);
        const path = findShortestPath(s, e, crit);
        if(!path) return alert("경로를 찾을 수 없습니다.");

        let timeS = 0, dist = 0, trans = 0;
        for(let i=0; i<path.length-1; i++){
          const edge = adjList[path[i]].find(e => e.to == path[i+1]);
          timeS += edge.time; dist += edge.dist; if(edge.isTransfer) trans++;
        }
        currentPathSet = new Set(path);
        const linkSet = new Set();
        for(let i=0; i<path.length-1; i++){ linkSet.add(`${path[i]}__${path[i+1]}`); linkSet.add(`${path[i+1]}__${path[i]}`); }
        
        nodeElements.classed('dimmed', d => !currentPathSet.has(d.id)).classed('highlight-node', d => currentPathSet.has(d.id)).attr('r', d => currentPathSet.has(d.id) ? 1.5 : 0.5);
        stationMarkerElements.classed('visible', d => currentPathSet.has(d.id)).classed('dimmed', d => !currentPathSet.has(d.id)).raise();
        linkElements.classed('dimmed', d => !linkSet.has(`${d.sourceId}__${d.targetId}`)).classed('highlight-link', d => linkSet.has(`${d.sourceId}__${d.targetId}`));
        
        const fare = calculateFare(dist);
        document.getElementById('result').innerHTML = `🕒 <b>소요시간:</b> ${Math.floor(timeS/60)}분 ${timeS%60}초 / 📏 <b>거리:</b> ${dist.toFixed(1)}km / 🔄 <b>환승:</b> ${trans}회<br>` +
          `<div class="fare-box">💳 <b>요금:</b> 일반 ${fare.adult}원 | 청소년 ${fare.teen}원 | 어린이 ${fare.child}원</div>`;
      }

      function resetMap(changeText = true) {
        currentPathSet = new Set();
        nodeElements.classed('dimmed', false).classed('highlight-node', false).attr('r', 0.5);
        linkElements.classed('dimmed', false).classed('highlight-link', false);
        stationMarkerElements.classed('visible', false).classed('dimmed', false);
        if(changeText) document.getElementById('result').innerText = '지도가 초기화되었습니다.';
      }
    </script>
  </body>
</html>
