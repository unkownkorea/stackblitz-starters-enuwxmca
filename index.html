<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>전국 지하철 네비게이션 (D3.js 연동)</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
      body {
        font-family: 'Pretendard', sans-serif;
        margin: 0;
        padding: 20px;
        background-color: #f8f9fa;
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
      }
      .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
        z-index: 10;
      }
      .controls {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }
      select,
      button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }
      button {
        background-color: #03c75a; /* 네이버 스타일 초록색 */
        color: white;
        font-weight: bold;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #02a84b;
      }

      #result {
        margin-top: 15px;
        font-weight: bold;
        color: #333;
        word-break: keep-all;
      }

      #map-container {
        flex: 1;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
        border: 2px solid #e9ecef;
      }

      svg {
        width: 100%;
        height: 100%;
        cursor: grab;
      }
      svg:active {
        cursor: grabbing;
      }

      /* SVG Elements Styling */
      .link {
        stroke: #ced4da;
        stroke-opacity: 0.6;
        stroke-width: 2px;
        transition: all 0.3s;
      }
      .node {
        stroke: #fff;
        stroke-width: 1.5px;
        transition: all 0.3s;
      }
      .label {
        font-size: 10px;
        fill: #495057;
        pointer-events: none;
        transition: all 0.3s;
      }

      /* Highlight Styling for Navigation */
      .dimmed {
        opacity: 0.1 !important;
      }
      .highlight-link {
        stroke: #ff0000 !important;
        stroke-opacity: 1 !important;
        stroke-width: 5px !important;
      }
      .highlight-node {
        stroke: #ff0000 !important;
        stroke-width: 3px !important;
        r: 8 !important;
      }
      .highlight-label {
        fill: #000 !important;
        font-size: 14px !important;
        font-weight: bold !important;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>🚇 실시간 지하철 경로 탐색기 (JSON 연동)</h2>
      <div class="controls">
        <select id="start-station">
          <option value="">출발역 선택...</option>
        </select>
        <span>➡️</span>
        <select id="end-station">
          <option value="">도착역 선택...</option>
        </select>
        <button onclick="findAndHighlightRoute()">최단 경로 탐색</button>
        <button onclick="resetMap()" style="background: #6c757d">초기화</button>
      </div>
      <div id="result">
        JSON 데이터를 불러오는 중입니다... 마우스 휠로 지도를 확대/축소하고
        드래그할 수 있습니다.
      </div>
    </div>

    <div id="map-container">
      <svg id="subway-map"></svg>
    </div>

    <script>
      let rawNodes = [];
      let graphLinks = [];
      let adjList = {};
      let nodeElements, linkElements, labelElements;

      // 호선별 색상 (네이버 지도 스타일 참고)
      const lineColors = {
        '01호선': '#0052A4',
        '02호선': '#009D3E',
        '03호선': '#EF7C1C',
        '04호선': '#00A5DE',
        '05호선': '#996CAC',
        '06호선': '#CD7C2F',
        '07호선': '#747F00',
        '08호선': '#E6186C',
        '09호선': '#BDB092',
        인천선: '#759CE6',
        인천2호선: '#FD8100',
        수인분당선: '#FABE00',
        경의선: '#77C4A3',
        경춘선: '#0C8E72',
        공항철도: '#0090D2',
        신분당선: '#D4003B',
        서해선: '#81A914',
        'GTX-A': '#9E7A8A',
      };

      // 1. 데이터 불러오기 및 그래프 생성
      fetch('subway.json')
        .then((response) => response.json())
        .then((data) => {
          const stationData = data.DATA;

          // 드롭다운 및 노드 배열 초기화
          const startSelect = document.getElementById('start-station');
          const endSelect = document.getElementById('end-station');

          // 노드(정점) 생성
          stationData.forEach((d) => {
            rawNodes.push({
              id: d.station_cd,
              name: d.station_nm,
              line: d.line_num,
              color: lineColors[d.line_num] || '#999',
            });

            let option = new Option(
              `${d.station_nm} (${d.line_num})`,
              d.station_cd
            );
            startSelect.add(option.cloneNode(true));
            endSelect.add(option);
          });

          // 간선(선로) 자동 생성 로직
          // (1) 같은 호선 내에서 역 코드(station_cd) 순으로 연결
          const lineGroups = d3.group(rawNodes, (d) => d.line);
          lineGroups.forEach((stations, line) => {
            // 역 코드를 기준으로 정렬하여 순서대로 잇기
            stations.sort((a, b) => a.id.localeCompare(b.id));
            for (let i = 0; i < stations.length - 1; i++) {
              graphLinks.push({
                source: stations[i].id,
                target: stations[i + 1].id,
              });
            }
          });

          // (2) 환승역 연결 (이름이 같은 다른 호선의 역들을 연결)
          const nameGroups = d3.group(rawNodes, (d) => d.name);
          nameGroups.forEach((stations, name) => {
            if (stations.length > 1) {
              for (let i = 0; i < stations.length; i++) {
                for (let j = i + 1; j < stations.length; j++) {
                  graphLinks.push({
                    source: stations[i].id,
                    target: stations[j].id,
                  });
                }
              }
            }
          });

          // 인접 리스트 생성 (길찾기 알고리즘용)
          rawNodes.forEach((n) => (adjList[n.id] = []));
          graphLinks.forEach((l) => {
            adjList[l.source].push(l.target);
            adjList[l.target].push(l.source); // 양방향 통행
          });

          document.getElementById(
            'result'
          ).innerText = `총 ${rawNodes.length}개의 역 데이터를 성공적으로 불러왔습니다. 목적지를 검색해 보세요!`;

          // D3 시각화 시작
          renderMap();
        });

      // 2. D3.js로 노선도 렌더링 (Force Graph)
      function renderMap() {
        const svg = d3.select('#subway-map');
        const width = document.getElementById('map-container').clientWidth;
        const height = document.getElementById('map-container').clientHeight;

        // 줌(확대/축소) 및 드래그 기능 추가
        const g = svg.append('g');
        svg.call(
          d3
            .zoom()
            .scaleExtent([0.1, 4])
            .on('zoom', (event) => {
              g.attr('transform', event.transform);
            })
        );

        // 물리 엔진 설정 (역들을 자연스럽게 펼침)
        const simulation = d3
          .forceSimulation(rawNodes)
          .force(
            'link',
            d3
              .forceLink(graphLinks)
              .id((d) => d.id)
              .distance(30)
          )
          .force('charge', d3.forceManyBody().strength(-150)) // 밀어내는 힘
          .force('center', d3.forceCenter(width / 2, height / 2)); // 중앙 정렬

        // 선(Link) 그리기
        linkElements = g
          .append('g')
          .selectAll('line')
          .data(graphLinks)
          .enter()
          .append('line')
          .attr('class', 'link')
          .attr('id', (d) => `link-${d.source.id}-${d.target.id}`);

        // 역 동그라미(Node) 그리기
        nodeElements = g
          .append('g')
          .selectAll('circle')
          .data(rawNodes)
          .enter()
          .append('circle')
          .attr('class', 'node')
          .attr('id', (d) => `node-${d.id}`)
          .attr('r', 5)
          .attr('fill', (d) => d.color);

        // 역 이름(Label) 그리기
        labelElements = g
          .append('g')
          .selectAll('text')
          .data(rawNodes)
          .enter()
          .append('text')
          .attr('class', 'label')
          .attr('id', (d) => `label-${d.id}`)
          .attr('dx', 8)
          .attr('dy', 3)
          .text((d) => d.name);

        // 시뮬레이션 틱마다 좌표 업데이트
        simulation.on('tick', () => {
          linkElements
            .attr('x1', (d) => d.source.x)
            .attr('y1', (d) => d.source.y)
            .attr('x2', (d) => d.target.x)
            .attr('y2', (d) => d.target.y);
          nodeElements.attr('cx', (d) => d.x).attr('cy', (d) => d.y);
          labelElements.attr('x', (d) => d.x).attr('y', (d) => d.y);
        });
      }

      // 3. 최단 경로 알고리즘 (BFS)
      function bfs(startId, endId) {
        if (startId === endId) return [startId];
        let queue = [[startId]];
        let visited = new Set([startId]);

        while (queue.length > 0) {
          let path = queue.shift();
          let current = path[path.length - 1];

          for (let neighbor of adjList[current]) {
            if (!visited.has(neighbor)) {
              let newPath = [...path, neighbor];
              if (neighbor === endId) return newPath;
              visited.add(neighbor);
              queue.push(newPath);
            }
          }
        }
        return null; // 경로 없음
      }

      // 4. 경로 탐색 및 하이라이트 UI 업데이트
      function findAndHighlightRoute() {
        const startId = document.getElementById('start-station').value;
        const endId = document.getElementById('end-station').value;

        if (!startId || !endId) {
          alert('출발역과 도착역을 모두 선택해주세요.');
          return;
        }

        resetMap(); // 기존 하이라이트 초기화

        const path = bfs(startId, endId);
        const resultDiv = document.getElementById('result');

        if (path) {
          // 모든 요소를 투명하게 처리 (dimmed)
          d3.selectAll('.node, .link, .label').classed('dimmed', true);

          let pathNames = [];

          // 경로에 있는 노드와 간선만 하이라이트
          for (let i = 0; i < path.length; i++) {
            let nodeId = path[i];
            let nodeData = rawNodes.find((n) => n.id === nodeId);
            pathNames.push(`${nodeData.name}(${nodeData.line})`);

            d3.select(`#node-${nodeId}`)
              .classed('dimmed', false)
              .classed('highlight-node', true)
              .raise();
            d3.select(`#label-${nodeId}`)
              .classed('dimmed', false)
              .classed('highlight-label', true)
              .raise();

            if (i < path.length - 1) {
              let nextId = path[i + 1];
              // 방향이 일정하지 않으므로 양방향 ID 모두 체크
              let linkEl = d3.select(`#link-${nodeId}-${nextId}`);
              if (linkEl.empty())
                linkEl = d3.select(`#link-${nextId}-${nodeId}`);

              linkEl
                .classed('dimmed', false)
                .classed('highlight-link', true)
                .raise();
            }
          }

          resultDiv.innerHTML = `총 <strong>${
            path.length - 1
          } 정거장</strong>을 이동합니다.<br>경로: ${pathNames.join(' ➡️ ')}`;
        } else {
          resultDiv.innerHTML = `<span style="color:red">경로를 찾을 수 없습니다. (데이터가 끊겨있을 수 있습니다)</span>`;
        }
      }

      // 지도 스타일 초기화
      function resetMap() {
        d3.selectAll('.node, .link, .label')
          .classed('dimmed', false)
          .classed('highlight-node', false)
          .classed('highlight-link', false)
          .classed('highlight-label', false);
        document.getElementById('result').innerText =
          '지도가 초기화되었습니다. 목적지를 검색해 보세요.';
      }
    </script>
  </body>
</html>
